<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E0C04"/>
      <stop offset="50%" style="stop-color:#6B2D0F"/>
      <stop offset="100%" style="stop-color:#1E0C04"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#D4A017;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#D4A017;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mandala-outer { animation: rotateCW 30s linear infinite; transform-box: fill-box; transform-origin: center; }
      .mandala-mid   { animation: rotateCCW 40s linear infinite; transform-box: fill-box; transform-origin: center; }
      .mandala-inner { animation: rotateCW 20s linear infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes rotateCW  { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes rotateCCW { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="260" fill="url(#bg)"/>
  <rect width="1200" height="260" fill="url(#centerGlow)"/>

  <!-- Border lines -->
  <line x1="0" y1="2" x2="1200" y2="2" stroke="#D4A017" stroke-width="0.6" opacity="0.5"/>
  <line x1="0" y1="258" x2="1200" y2="258" stroke="#D4A017" stroke-width="0.6" opacity="0.5"/>

  <!-- ═══ LEFT MANDALA at (145, 130) ═══ -->
  <g transform="translate(145,130)">
    <g class="mandala-outer" stroke="#D4A017" stroke-width="0.7" fill="none" opacity="0.55">
      <ellipse rx="100" ry="15"/>
      <ellipse rx="100" ry="15" transform="rotate(22.5)"/>
      <ellipse rx="100" ry="15" transform="rotate(45)"/>
      <ellipse rx="100" ry="15" transform="rotate(67.5)"/>
      <ellipse rx="100" ry="15" transform="rotate(90)"/>
      <ellipse rx="100" ry="15" transform="rotate(112.5)"/>
      <ellipse rx="100" ry="15" transform="rotate(135)"/>
      <ellipse rx="100" ry="15" transform="rotate(157.5)"/>
    </g>
    <g class="mandala-mid" stroke="#C8860A" stroke-width="0.7" fill="none" opacity="0.6">
      <ellipse rx="66" ry="11"/>
      <ellipse rx="66" ry="11" transform="rotate(22.5)"/>
      <ellipse rx="66" ry="11" transform="rotate(45)"/>
      <ellipse rx="66" ry="11" transform="rotate(67.5)"/>
      <ellipse rx="66" ry="11" transform="rotate(90)"/>
      <ellipse rx="66" ry="11" transform="rotate(112.5)"/>
      <ellipse rx="66" ry="11" transform="rotate(135)"/>
      <ellipse rx="66" ry="11" transform="rotate(157.5)"/>
    </g>
    <g class="mandala-inner" stroke="#E8B84B" stroke-width="0.8" fill="none" opacity="0.7">
      <ellipse rx="36" ry="7"/>
      <ellipse rx="36" ry="7" transform="rotate(30)"/>
      <ellipse rx="36" ry="7" transform="rotate(60)"/>
      <ellipse rx="36" ry="7" transform="rotate(90)"/>
      <ellipse rx="36" ry="7" transform="rotate(120)"/>
      <ellipse rx="36" ry="7" transform="rotate(150)"/>
    </g>
    <circle r="18" stroke="#D4A017" stroke-width="0.6" fill="none" opacity="0.55"/>
    <circle r="7"  stroke="#E8B84B" stroke-width="0.6" fill="none" opacity="0.65"/>
    <circle r="3.5" fill="#FFD700" opacity="0.9"/>
    <circle r="1.5" fill="#FFF8DC"/>
  </g>

  <!-- ═══ RIGHT MANDALA at (1055, 130) ═══ -->
  <g transform="translate(1055,130)">
    <g class="mandala-outer" stroke="#D4A017" stroke-width="0.7" fill="none" opacity="0.55">
      <ellipse rx="100" ry="15"/>
      <ellipse rx="100" ry="15" transform="rotate(22.5)"/>
      <ellipse rx="100" ry="15" transform="rotate(45)"/>
      <ellipse rx="100" ry="15" transform="rotate(67.5)"/>
      <ellipse rx="100" ry="15" transform="rotate(90)"/>
      <ellipse rx="100" ry="15" transform="rotate(112.5)"/>
      <ellipse rx="100" ry="15" transform="rotate(135)"/>
      <ellipse rx="100" ry="15" transform="rotate(157.5)"/>
    </g>
    <g class="mandala-mid" stroke="#C8860A" stroke-width="0.7" fill="none" opacity="0.6">
      <ellipse rx="66" ry="11"/>
      <ellipse rx="66" ry="11" transform="rotate(22.5)"/>
      <ellipse rx="66" ry="11" transform="rotate(45)"/>
      <ellipse rx="66" ry="11" transform="rotate(67.5)"/>
      <ellipse rx="66" ry="11" transform="rotate(90)"/>
      <ellipse rx="66" ry="11" transform="rotate(112.5)"/>
      <ellipse rx="66" ry="11" transform="rotate(135)"/>
      <ellipse rx="66" ry="11" transform="rotate(157.5)"/>
    </g>
    <g class="mandala-inner" stroke="#E8B84B" stroke-width="0.8" fill="none" opacity="0.7">
      <ellipse rx="36" ry="7"/>
      <ellipse rx="36" ry="7" transform="rotate(30)"/>
      <ellipse rx="36" ry="7" transform="rotate(60)"/>
      <ellipse rx="36" ry="7" transform="rotate(90)"/>
      <ellipse rx="36" ry="7" transform="rotate(120)"/>
      <ellipse rx="36" ry="7" transform="rotate(150)"/>
    </g>
    <circle r="18" stroke="#D4A017" stroke-width="0.6" fill="none" opacity="0.55"/>
    <circle r="7"  stroke="#E8B84B" stroke-width="0.6" fill="none" opacity="0.65"/>
    <circle r="3.5" fill="#FFD700" opacity="0.9"/>
    <circle r="1.5" fill="#FFF8DC"/>
  </g>

  <!-- ═══ CENTER TEXT ═══ -->
  <text x="602" y="128"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72" font-weight="bold"
    fill="#1E0C04" text-anchor="middle" opacity="0.55">Subasri B</text>
  <text x="600" y="125"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72" font-weight="bold"
    fill="#FFD700" text-anchor="middle"
    filter="url(#textGlow)">Subasri B</text>

  <!-- Divider ornament -->
  <line x1="420" y1="145" x2="550" y2="145" stroke="#D4A017" stroke-width="0.7" opacity="0.5"/>
  <circle cx="600" cy="145" r="3" fill="#D4A017" opacity="0.65"/>
  <line x1="650" y1="145" x2="780" y2="145" stroke="#D4A017" stroke-width="0.7" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="600" y="178"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18" font-style="italic"
    fill="#E8C57A" text-anchor="middle" letter-spacing="5">Engineer · Creator · Dreamer</text>

  <!-- Corner ornaments -->
  <g stroke="#D4A017" stroke-width="1" fill="none" opacity="0.4">
    <path d="M 22,12 L 55,12 L 55,18"/>
    <path d="M 22,12 L 22,45"/>
    <path d="M 1178,12 L 1145,12 L 1145,18"/>
    <path d="M 1178,12 L 1178,45"/>
    <path d="M 22,248 L 55,248 L 55,242"/>
    <path d="M 22,248 L 22,215"/>
    <path d="M 1178,248 L 1145,248 L 1145,242"/>
    <path d="M 1178,248 L 1178,215"/>
  </g>
</svg>
