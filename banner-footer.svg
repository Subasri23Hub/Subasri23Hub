<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" width="1200" height="100">
  <defs>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D1A06;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#6B2D0F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C1A0E;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="goldGlow2" cx="50%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#D4A017;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#D4A017;stop-opacity:0" />
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Wave shape background -->
  <path d="M0,0 Q200,60 400,30 Q600,0 800,40 Q1000,70 1200,20 L1200,100 L0,100 Z" fill="url(#footerGrad)"/>
  <rect width="1200" height="100" fill="url(#goldGlow2)"/>

  <!-- Top decorative line -->
  <path d="M0,0 Q200,60 400,30 Q600,0 800,40 Q1000,70 1200,20" stroke="#D4A017" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Small mandala left -->
  <g transform="translate(80, 65)" opacity="0.5" filter="url(#glow2)">
    <g stroke="#D4A017" stroke-width="0.6" fill="none">
      <ellipse rx="20" ry="4" transform="rotate(0)"/>
      <ellipse rx="20" ry="4" transform="rotate(30)"/>
      <ellipse rx="20" ry="4" transform="rotate(60)"/>
      <ellipse rx="20" ry="4" transform="rotate(90)"/>
      <ellipse rx="20" ry="4" transform="rotate(120)"/>
      <ellipse rx="20" ry="4" transform="rotate(150)"/>
      <circle r="8"/>
    </g>
    <circle r="2" fill="#D4A017"/>
  </g>

  <!-- Small mandala right -->
  <g transform="translate(1120, 65)" opacity="0.5" filter="url(#glow2)">
    <g stroke="#D4A017" stroke-width="0.6" fill="none">
      <ellipse rx="20" ry="4" transform="rotate(0)"/>
      <ellipse rx="20" ry="4" transform="rotate(30)"/>
      <ellipse rx="20" ry="4" transform="rotate(60)"/>
      <ellipse rx="20" ry="4" transform="rotate(90)"/>
      <ellipse rx="20" ry="4" transform="rotate(120)"/>
      <ellipse rx="20" ry="4" transform="rotate(150)"/>
      <circle r="8"/>
    </g>
    <circle r="2" fill="#D4A017"/>
  </g>

  <!-- Tiny airplane -->
  <g transform="translate(600, 70) rotate(-10)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="14" ry="3.5" fill="#D4A017"/>
    <polygon points="-3,-3 7,-3 12,0.5 7,4 -3,4" fill="#C8860A"/>
    <polygon points="-14,-2.5 -9,-2.5 -9,0 -14,0" fill="#B8730A"/>
    <path d="M -14,0 Q -35,1.5 -60,5" stroke="#E8B84B" stroke-width="0.8" fill="none" opacity="0.5" stroke-dasharray="3,3"/>
  </g>

  <!-- Center text -->
  <text x="600" y="55"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    fill="#C8A05A"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0.85">✦  Subasri B  ·  Engineer · Creator · Dreamer  ✦</text>

  <!-- Corner ornaments -->
  <g stroke="#D4A017" stroke-width="0.8" fill="none" opacity="0.45">
    <path d="M 15,5 L 40,5 L 40,10"/>
    <path d="M 15,5 L 15,25"/>
    <path d="M 1185,5 L 1160,5 L 1160,10"/>
    <path d="M 1185,5 L 1185,25"/>
  </g>
</svg>
